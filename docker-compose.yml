services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"         # loopback only — never 0.0.0.0 in prod
    volumes:
      - /home/bthek1/ollama_doc/models:/root/.ollama/models  # bind mount to the models subdir
    environment:
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KEEP_ALIVE: "10m"
      OLLAMA_ORIGINS: "http://localhost:8000"
    devices:
      - "nvidia.com/gpu=all"     # CDI passthrough — works with cgroup v2
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: >
      sh -c "
        ollama pull llama3.2
      "
    restart: "no"
